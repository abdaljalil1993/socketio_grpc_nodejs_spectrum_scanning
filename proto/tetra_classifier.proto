syntax = "proto3";
package tetra_classifier.v1;

// TETRA Classifier — Spec 006. Per-frequency "is this TETRA?" plus a
// pass-through of all tetra-kit frames observed during the capture.

service TETRAClassifier {
  rpc ClassifyFrequency (ClassifyFrequencyRequest) returns (ClassifyFrequencyResponse);
}

enum Verdict {
  VERDICT_UNSPECIFIED  = 0;
  VERDICT_TETRA        = 1;
  VERDICT_NOT_TETRA    = 2;
  VERDICT_INCONCLUSIVE = 3;
}

enum GainMode {
  GAIN_MODE_UNSPECIFIED = 0;
  GAIN_MODE_AUTO        = 1;
  GAIN_MODE_MANUAL      = 2;
}

message ClassifyFrequencyRequest {
  // Required. Target center frequency in Hz.
  uint64 target_freq_hz = 1;

  // Optional. Capture window in ms. Min 800 (below this tetra-kit's PHY does
  // not reliably lock); clamped to MAX (default 10_000). 0/unset → 1500.
  uint32 capture_ms = 2;

  // Optional. Specific SDR. Empty → service picks first device.
  string device_id = 3;

  // Optional. Tuner gain mode.
  GainMode gain_mode = 4;

  // Optional. Manual tuner gain, tenths of dB. Honoured only when MANUAL.
  int32 gain_tenth_db = 5;

  // Optional. If true, return as soon as the first BSCH/SYSINFO frame is
  // observed (typically 800-1200 ms after spawn). Otherwise hold the full
  // capture_ms to collect more evidence and traffic frames.
  bool early_exit_on_first_frame = 6;

  // Optional. Cap on how many tetra-kit frames to return in `frames`.
  // 0/unset → service default 200. Hard ceiling enforced server-side: 5000.
  uint32 max_frames = 7;
}

message ClassifyFrequencyResponse {
  Verdict verdict     = 1;
  bool    is_tetra    = 2;
  float   confidence  = 3;

  TETRAEvidence evidence = 4;

  // Echo of what the service actually did.
  uint64 captured_freq_hz        = 5;
  uint32 captured_sample_rate_hz = 6;
  uint32 captured_ms             = 7;
  uint32 effective_capture_ms    = 8;
  string device_id_used          = 9;

  GainMode gain_mode_used     = 10;
  int32    gain_tenth_db_used = 11;

  // Pass-through of decoded tetra-kit frames observed during the window,
  // truncated to max_frames. Each entry is the raw JSON line emitted by
  // tetra-kit's recorder.
  repeated string frames = 12;

  // True if the response was truncated to max_frames.
  bool frames_truncated = 13;
}

message TETRAEvidence {
  // ── Frame-type counters ──
  uint32 frames_observed              = 1;
  uint32 bsch_frames                  = 2;
  uint32 sysinfo_frames               = 3;
  uint32 tch_s_frames                 = 4;
  uint32 cmce_frames                  = 5;
  uint32 distinct_calls               = 6;

  // ── Cell identity (extracted from first BSCH/SYSINFO if present) ──
  uint32 mcc                          = 7;
  uint32 mnc                          = 8;
  uint32 location_area                = 9;
  uint32 colour_code                  = 10;
  uint64 advertised_freq_hz           = 11;

  // ── Operational metrics ──
  // Wall-clock ms from PHY spawn until the first decoded frame arrived.
  uint32 time_to_first_frame_ms       = 12;

  // True if at least one observed call was unencrypted (encr=0).
  bool   any_call_unencrypted         = 13;
}
